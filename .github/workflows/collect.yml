name: Collect Tax Hot Topics

on:
  schedule:
    # 00:00 UTC = 08:00 Beijing
    - cron: "0 0 * * *"
    # 10:00 UTC = 18:00 Beijing
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 lxml

      - name: Run data collector
        run: python collect_data.py

      - name: Commit and push data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          git add data/ --force
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update tax hot-topics data 6-03-31T00:54:02Z"
            git push
          fi
